<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Short Films — Chethan Banala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      padding: 32px 24px 48px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 40px;
      opacity: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #f97316;
      color: #f97316;
      text-decoration: none;
      font-size: 1rem;
      flex-shrink: 0;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .back-btn:hover {
      background: #f97316;
      color: #fff;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: 4px;
      background: linear-gradient(90deg, #f97316, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .section {
      max-width: 900px;
      margin: 0 auto 48px;
      opacity: 0;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #ec4899;
      margin-bottom: 16px;
      padding-left: 2px;
    }

    .section-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, #f97316, transparent);
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .tile {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      cursor: pointer;
      display: block;
      background: #0a0a1a;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .tile:hover:not(.playing) {
      transform: translateY(-4px) scale(1.02);
      filter: brightness(1.1);
    }

    .tile.playing {
      cursor: default;
    }

    .tile-bg {
      position: absolute;
      inset: 0;
      background-color: #0a0a1a;
      background-size: cover;
      background-position: center;
    }

    .tile-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 60%);
    }

    .tile-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .badge-trailer { background: rgba(236, 72, 153, 0.85); color: #fff; }
    .badge-film { background: rgba(249, 115, 22, 0.85); color: #fff; }
    .badge-locked { background: rgba(0,0,0,0.6); color: #a78bfa; border: 1px solid #a78bfa; }
    .badge-coming-soon { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

    .tile-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1rem;
      transition: background 0.2s ease;
    }

    .tile:hover .tile-play { background: rgba(249, 115, 22, 0.7); }

    .tile-name {
      position: absolute;
      bottom: 14px;
      left: 16px;
      right: 16px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    /* Coming Soon tile */
    .tile-coming-soon {
      border: 2px dashed rgba(249, 115, 22, 0.3);
      background: rgba(249, 115, 22, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: default;
    }

    .tile-coming-soon:hover { transform: none; filter: none; }

    .coming-soon-icon { font-size: 1.6rem; opacity: 0.5; }
    .coming-soon-text {
      color: #f97316;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.6;
      text-align: center;
      padding: 0 16px;
    }

    /* Inline player */
    .tile iframe,
    .tile video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 16px;
    }

    /* Fullscreen button overlay */
    .fullscreen-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .fullscreen-btn:hover { background: rgba(249,115,22,0.8); }

    /* Hide native fullscreen button from video controls */
    video::-webkit-media-controls-fullscreen-button { display: none; }

    /* iOS pseudo-fullscreen fallback */
    .tile.pseudo-fullscreen {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100svh !important;
      z-index: 9999 !important;
      border-radius: 0 !important;
      aspect-ratio: unset !important;
    }

    /* PIN Modal */
    .pin-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }

    .pin-modal.active { display: flex; }

    .pin-modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #f97316, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pin-modal-subtitle {
      color: #64748b;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: -16px;
    }

    .pin-dots {
      display: flex;
      gap: 16px;
    }

    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #475569;
      background: transparent;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .pin-dot.filled {
      background: #f97316;
      border-color: #f97316;
    }

    .pin-dot.error {
      background: #ef4444;
      border-color: #ef4444;
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .pin-key {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid #334155;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1.4rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Inter', sans-serif;
    }

    .pin-key:hover { background: rgba(249,115,22,0.2); }
    .pin-key:active { background: rgba(249,115,22,0.4); }

    .pin-key.delete { font-size: 1rem; color: #94a3b8; }
    .pin-key.empty { visibility: hidden; }

    .pin-cancel {
      color: #475569;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 16px;
      transition: color 0.2s ease;
    }

    .pin-cancel:hover { color: #94a3b8; }

    @keyframes shake-pin {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    .pin-dots.shake { animation: shake-pin 0.4s ease; }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="back-btn">←</a>
    <h1 class="page-title">Short Films</h1>
  </div>

  <!-- TRAILERS -->
  <div class="section" id="trailers">
    <div class="section-label">Trailers</div>
    <div class="section-divider"></div>
    <div class="grid">

      <div class="tile" data-type="youtube" data-id="G3EHY0Ko5UA">
        <div class="tile-bg" style="background-image: url('https://img.youtube.com/vi/G3EHY0Ko5UA/maxresdefault.jpg')"></div>
        <div class="tile-overlay"></div>
        <div class="tile-badge badge-trailer">Trailer</div>
        <div class="tile-play">▶</div>
        <div class="tile-name">The Note</div>
      </div>

      <div class="tile tile-coming-soon" data-type="own" data-src="">
        <div class="tile-bg" style="background-image: url('silent-pour-poster.png');"></div>
        <div class="tile-overlay"></div>
        <div class="tile-badge badge-coming-soon">Coming Soon</div>
        <div class="tile-name">Silent Pour</div>
      </div>

    </div>
  </div>

  <!-- FULL FILMS -->
  <div class="section" id="full-films">
    <div class="section-label">Full Films</div>
    <div class="section-divider"></div>
    <div class="grid">

      <div class="tile" data-type="youtube" data-id="UIhZE1KRTj4">
        <div class="tile-bg" style="background-image: url('https://img.youtube.com/vi/UIhZE1KRTj4/maxresdefault.jpg')"></div>
        <div class="tile-overlay"></div>
        <div class="tile-badge badge-film">Full Film</div>
        <div class="tile-play">▶</div>
        <div class="tile-name">The Note</div>
      </div>

      <div class="tile" data-type="own" data-src="https://cbanala-videos.b-cdn.net/SP%20%5BD-01%5D%2002.15.26.MP4" data-pin="true">
        <div class="tile-bg" style="background-image: url('silent-pour-poster.png');"></div>
        <div class="tile-overlay"></div>
        <div class="tile-badge badge-locked">🔒 Private</div>
        <div class="tile-play">▶</div>
        <div class="tile-name">Silent Pour</div>
      </div>

    </div>
  </div>

  <!-- PIN Modal -->
  <div class="pin-modal" id="pinModal">
    <div class="pin-modal-title">Enter PIN</div>
    <div class="pin-modal-subtitle">Private screening</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <div class="pin-key" data-digit="1">1</div>
      <div class="pin-key" data-digit="2">2</div>
      <div class="pin-key" data-digit="3">3</div>
      <div class="pin-key" data-digit="4">4</div>
      <div class="pin-key" data-digit="5">5</div>
      <div class="pin-key" data-digit="6">6</div>
      <div class="pin-key" data-digit="7">7</div>
      <div class="pin-key" data-digit="8">8</div>
      <div class="pin-key" data-digit="9">9</div>
      <div class="pin-key empty"></div>
      <div class="pin-key" data-digit="0">0</div>
      <div class="pin-key delete" id="pinDelete">⌫</div>
    </div>
    <div class="pin-cancel" id="pinCancel">Cancel</div>
  </div>

  <script type="module">
    import { animate, stagger } from 'https://cdn.jsdelivr.net/npm/motion@11/+esm';

    animate('.header', { opacity: [0, 1], y: [-20, 0] }, { duration: 0.6, easing: 'ease-out' });
    animate('.section', { opacity: [0, 1], y: [30, 0] }, {
      duration: 0.5,
      delay: stagger(0.15, { start: 0.3 }),
      easing: 'ease-out',
    });

    // --- Fullscreen helper ---
    const expandIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
    const compressIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>';

    function addFullscreenBtn(tile) {
      const btn = document.createElement('button');
      btn.className = 'fullscreen-btn';
      btn.innerHTML = expandIcon;
      btn.title = 'Fullscreen';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();

        // Exit pseudo-fullscreen if active
        if (tile.classList.contains('pseudo-fullscreen')) {
          tile.classList.remove('pseudo-fullscreen');
          btn.innerHTML = expandIcon;
          document.body.style.overflow = '';
          return;
        }

        const media = tile.querySelector('iframe, video');
        const el = media || tile;

        if (el.requestFullscreen) {
          el.requestFullscreen();
        } else if (el.webkitEnterFullscreen) {
          // iOS native fullscreen for <video>
          el.webkitEnterFullscreen();
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        } else {
          // iOS fallback for YouTube iframes — expand tile to fill screen
          tile.classList.add('pseudo-fullscreen');
          btn.innerHTML = compressIcon;
          document.body.style.overflow = 'hidden';
        }
      });
      tile.appendChild(btn);
    }

    // --- Play a tile ---
    function playTile(tile) {
      const type = tile.dataset.type;
      const id = tile.dataset.id;
      const src = tile.dataset.src;

      if (type === 'youtube' && id) {
        tile.classList.add('playing');
        tile.innerHTML = `<iframe
          src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0&origin=https://cbanala.github.io"
          allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media"
          allowfullscreen>
        </iframe>`;
        addFullscreenBtn(tile);
      } else if (type === 'own' && src) {
        tile.classList.add('playing');
        tile.innerHTML = `<video
          src="${src}"
          controls
          autoplay
          playsinline
          x-webkit-airplay="allow">
        </video>`;
        addFullscreenBtn(tile);
      }
    }

    // --- PIN logic ---
    const CORRECT_PIN = '6327';
    let currentPin = '';
    let pendingTile = null;
    const modal = document.getElementById('pinModal');
    const dots = document.querySelectorAll('.pin-dot');
    const pinDots = document.getElementById('pinDots');

    function updateDots() {
      dots.forEach((dot, i) => {
        dot.classList.toggle('filled', i < currentPin.length);
        dot.classList.remove('error');
      });
    }

    function resetPin() {
      currentPin = '';
      updateDots();
    }

    function showError() {
      dots.forEach(dot => dot.classList.add('error'));
      pinDots.classList.add('shake');
      setTimeout(() => {
        pinDots.classList.remove('shake');
        resetPin();
      }, 500);
    }

    document.querySelectorAll('.pin-key[data-digit]').forEach(key => {
      key.addEventListener('click', () => {
        if (currentPin.length >= 4) return;
        currentPin += key.dataset.digit;
        updateDots();
        if (currentPin.length === 4) {
          setTimeout(() => {
            if (currentPin === CORRECT_PIN) {
              modal.classList.remove('active');
              resetPin();
              if (pendingTile) playTile(pendingTile);
            } else {
              showError();
            }
          }, 150);
        }
      });
    });

    document.getElementById('pinDelete').addEventListener('click', () => {
      currentPin = currentPin.slice(0, -1);
      updateDots();
    });

    document.getElementById('pinCancel').addEventListener('click', () => {
      modal.classList.remove('active');
      resetPin();
      pendingTile = null;
    });

    // --- Tile click handler ---
    document.querySelectorAll('.tile').forEach(tile => {
      tile.addEventListener('click', () => {
        if (tile.classList.contains('playing')) return;
        if (tile.dataset.pin === 'true') {
          pendingTile = tile;
          resetPin();
          modal.classList.add('active');
        } else {
          playTile(tile);
        }
      });
    });
  </script>

</body>
</html>
