<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dance — Chethan Banala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      padding: 32px 24px 48px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 36px;
      opacity: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #a78bfa;
      color: #a78bfa;
      text-decoration: none;
      font-size: 1rem;
      flex-shrink: 0;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .back-btn:hover {
      background: #a78bfa;
      color: #fff;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: 4px;
      background: linear-gradient(90deg, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .tile {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      cursor: pointer;
      display: block;
      opacity: 0;
      transition: transform 0.25s ease, filter 0.25s ease;
      background: #0a0a1a;
    }

    .tile:hover:not(.playing) {
      transform: translateY(-4px) scale(1.02);
      filter: brightness(1.1);
    }

    .tile.playing {
      cursor: default;
    }

    .tile-bg {
      position: absolute;
      inset: 0;
      background-color: #0a0a1a;
      background-size: cover;
      background-position: center;
    }

    .tile-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 60%);
    }

    .tile-name {
      position: absolute;
      bottom: 14px;
      left: 16px;
      right: 16px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .tile-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1rem;
      transition: background 0.2s ease;
    }

    .tile:hover .tile-play {
      background: rgba(167, 139, 250, 0.8);
    }

    /* Coming Soon tile */
    .tile-coming-soon {
      border: 2px dashed rgba(167, 139, 250, 0.3);
      background: rgba(124, 58, 237, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: default;
    }

    .tile-coming-soon:hover {
      transform: none;
      filter: none;
    }

    .coming-soon-icon {
      font-size: 1.6rem;
      opacity: 0.5;
    }

    .coming-soon-text {
      color: #a78bfa;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.6;
      text-align: center;
      padding: 0 16px;
    }

    /* Inline video player */
    .tile iframe,
    .tile video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 16px;
    }

    /* Fullscreen button overlay */
    .fullscreen-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .fullscreen-btn:hover { background: rgba(167,139,250,0.8); }

    /* Hide native fullscreen button from video controls */
    video::-webkit-media-controls-fullscreen-button { display: none; }

    /* iOS pseudo-fullscreen fallback */
    .tile.pseudo-fullscreen {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100svh !important;
      z-index: 9999 !important;
      border-radius: 0 !important;
      aspect-ratio: unset !important;
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="back-btn">←</a>
    <h1 class="page-title">Dance</h1>
  </div>

  <div class="grid">

    <div class="tile" data-type="youtube" data-id="EWTYhb50tPg">
      <div class="tile-bg" style="background-image: url('https://img.youtube.com/vi/EWTYhb50tPg/hqdefault.jpg')"></div>
      <div class="tile-overlay"></div>
      <div class="tile-play">▶</div>
      <div class="tile-name">I'm Still Here — Chethan & Mallory</div>
    </div>

    <div class="tile" data-type="youtube" data-id="1TDFx1prunI">
      <div class="tile-bg" style="background-image: url('https://img.youtube.com/vi/1TDFx1prunI/maxresdefault.jpg')"></div>
      <div class="tile-overlay"></div>
      <div class="tile-play">▶</div>
      <div class="tile-name">Sucker for You</div>
    </div>

    <div class="tile" data-type="youtube" data-id="767T910x-CE">
      <div class="tile-bg" style="background-image: url('https://img.youtube.com/vi/767T910x-CE/hqdefault.jpg')"></div>
      <div class="tile-overlay"></div>
      <div class="tile-play">▶</div>
      <div class="tile-name">Let Me Think About It — Choreography by Chethan Banala</div>
    </div>

    <div class="tile" data-type="youtube" data-id="esHj3Z5wWfQ">
      <div class="tile-bg" style="background-image: url('https://img.youtube.com/vi/esHj3Z5wWfQ/maxresdefault.jpg')"></div>
      <div class="tile-overlay"></div>
      <div class="tile-play">▶</div>
      <div class="tile-name">Tribute to Hrithik Roshan</div>
    </div>

    <div class="tile" data-type="youtube" data-id="7uLo_6IIEYI">
      <div class="tile-bg" style="background-image: url('https://img.youtube.com/vi/7uLo_6IIEYI/maxresdefault.jpg')"></div>
      <div class="tile-overlay"></div>
      <div class="tile-play">▶</div>
      <div class="tile-name">Bollywood Routine</div>
    </div>

    <!-- Coming Soon: set data-type="youtube" data-id="VIDEO_ID" when ready -->
    <div class="tile tile-coming-soon" data-type="own" data-src="">
      <div class="coming-soon-icon">💃</div>
      <div class="coming-soon-text">More coming soon</div>
    </div>

  </div>

  <script type="module">
    import { animate, stagger } from 'https://cdn.jsdelivr.net/npm/motion@11/+esm';

    animate('.header', { opacity: [0, 1], y: [-20, 0] }, { duration: 0.6, easing: 'ease-out' });
    animate('.tile', { opacity: [0, 1], y: [30, 0] }, {
      duration: 0.5,
      delay: stagger(0.08, { start: 0.2 }),
      easing: 'ease-out',
    });

    const expandIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
    const compressIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>';

    function addFullscreenBtn(tile) {
      const btn = document.createElement('button');
      btn.className = 'fullscreen-btn';
      btn.innerHTML = expandIcon;
      btn.title = 'Fullscreen';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();

        if (tile.classList.contains('pseudo-fullscreen')) {
          tile.classList.remove('pseudo-fullscreen');
          btn.innerHTML = expandIcon;
          document.body.style.overflow = '';
          return;
        }

        const media = tile.querySelector('iframe, video');
        const el = media || tile;

        if (el.requestFullscreen) {
          el.requestFullscreen();
        } else if (el.webkitEnterFullscreen) {
          el.webkitEnterFullscreen();
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        } else {
          tile.classList.add('pseudo-fullscreen');
          btn.innerHTML = compressIcon;
          document.body.style.overflow = 'hidden';
        }
      });
      tile.appendChild(btn);
    }

    document.querySelectorAll('.tile').forEach(tile => {
      tile.addEventListener('click', () => {
        if (tile.classList.contains('playing')) return;
        const type = tile.dataset.type;
        const id = tile.dataset.id;
        const src = tile.dataset.src;

        if (type === 'youtube' && id) {
          tile.classList.add('playing');
          tile.innerHTML = `<iframe
            src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0&origin=https://cbanala.github.io"
            allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media"
            allowfullscreen>
          </iframe>`;
          addFullscreenBtn(tile);
        } else if (type === 'own' && src) {
          tile.classList.add('playing');
          tile.innerHTML = `<video
            src="${src}"
            controls
            autoplay
            playsinline
            x-webkit-airplay="allow">
          </video>`;
          addFullscreenBtn(tile);
        }
      });
    });
  </script>

</body>
</html>
