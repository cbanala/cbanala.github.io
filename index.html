<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chethan Banala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      padding: 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 5.5rem);
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(90deg, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      opacity: 0;
    }

    .tagline {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a78bfa;
      margin-bottom: 18px;
      opacity: 0;
    }

.divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      border-radius: 2px;
      margin-bottom: 20px;
      opacity: 0;
      transform-origin: left center;
    }

    .bio {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 32px;
      opacity: 0;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .link-btn {
      display: block;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      color: #ffffff;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      opacity: 0;
    }

    .link-btn:hover {
      transform: translateY(-2px) scale(1.02);
      filter: brightness(1.15);
    }

    .link-btn.youtube {
      background: linear-gradient(90deg, #7c3aed, #ec4899);
    }

    .link-btn.instagram {
      background: linear-gradient(90deg, #ec4899, #f97316);
    }

    .link-btn.short-film {
      background: linear-gradient(90deg, #0ea5e9, #7c3aed);
    }

    .link-btn.travel {
      background: linear-gradient(90deg, #10b981, #0ea5e9);
    }

    .link-btn.films {
      background: linear-gradient(90deg, #f97316, #ec4899);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="name">Chethan Banala</h1>
    <p class="tagline">content creator · filmmaker · dancer · traveler</p>
    <div class="divider"></div>
    <p class="bio">
      Hey, I'm Chethan Banala — a content creator, short filmmaker, dancer, and traveler.
      This is where you'll find my short films, reels, dance, and travel videos.
      Come sync with me.
    </p>
    <nav class="links">
      <a class="link-btn films" href="films.html">
        🎬 Short Films
      </a>
      <a class="link-btn travel" href="travel.html">
        ✈️ Travel Videos
      </a>
      <a class="link-btn instagram" href="https://www.instagram.com/the_story_of_cb/" target="_blank" rel="noopener">
        📷 Instagram
      </a>
      <a class="link-btn youtube" href="https://www.youtube.com/@the_story_of_cb" target="_blank" rel="noopener">
        ▶ YouTube
      </a>
    </nav>
  </main>
  <script type="module">
    import { animate, stagger } from 'https://cdn.jsdelivr.net/npm/motion@11/+esm';

    // Name slides up and fades in
    animate('.name', { opacity: [0, 1], y: [30, 0] }, { duration: 0.7, easing: 'ease-out' });

    // Tagline fades in after name
    animate('.tagline', { opacity: [0, 1], y: [20, 0] }, { duration: 0.6, delay: 0.2, easing: 'ease-out' });

    // Divider scales in from left
    animate('.divider', { opacity: [0, 1], scaleX: [0, 1] }, { duration: 0.5, delay: 0.4, easing: 'ease-out' });

    // Bio fades in
    animate('.bio', { opacity: [0, 1], y: [15, 0] }, { duration: 0.6, delay: 0.55, easing: 'ease-out' });

    // Link buttons stagger in
    animate('.link-btn', { opacity: [0, 1], y: [20, 0] }, {
      duration: 0.5,
      delay: stagger(0.1, { start: 0.7 }),
      easing: 'ease-out',
    });
  </script>
</body>
</html>
